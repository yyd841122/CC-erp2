spring:
  # H2 数据库配置（开发环境）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cc_erp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      validation-query: SELECT 1

  # H2 控制台（可选，用于调试）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # Flyway 配置
  flyway:
    enabled: false  # H2 内存数据库使用 JPA 初始化
